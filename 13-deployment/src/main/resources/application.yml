spring:
  application.name: deployment-demo
  ai:
    openai.api-key: ${OPENAI_API_KEY:not-configured}
    ollama.base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
app:
  security.jwt:
    secret: ${JWT_SECRET}   # Must be set via K8s secret — no default in production
    expiration-ms: 3600000
  rate-limit:
    capacity-per-user: 20
    refill-tokens-per-minute: 20
    global-capacity: 500
    global-refill-tokens-per-minute: 500
management:
  endpoints:
    web:
      exposure.include: health,info,prometheus,readiness,liveness
  endpoint.health.probes.enabled: true
  health.livenessState.enabled: true
  health.readinessState.enabled: true
springdoc.swagger-ui.path: /swagger-ui.html
# OTel — send to sidecar collector in K8s
management.otlp.tracing.endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
management.tracing.sampling.probability: 0.1   # 10% in production

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-api
  namespace: ai-agents
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
# Pod Disruption Budget — ensures at least 1 pod is always available during rolling updates
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: agent-api
  namespace: ai-agents
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: agent-api

spring:
  application.name: memory-and-context
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:not-configured}
      chat.options.model: gpt-4o-mini
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat.options.model: llama3.1
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:masterclass}

app:
  security.jwt:
    secret: ${JWT_SECRET:change-me-in-production-must-be-256-bits-long}
    expiration-ms: 3600000
  rate-limit:
    capacity-per-user: 20
    refill-tokens-per-minute: 20
    global-capacity: 200
    global-refill-tokens-per-minute: 200
  memory:
    max-messages: 20    # sliding window size (includes both user and assistant messages)
    ttl-minutes: 60     # Redis key TTL

management.endpoints.web.exposure.include: health,info,prometheus
springdoc.swagger-ui.path: /swagger-ui.html

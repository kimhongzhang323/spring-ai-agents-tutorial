spring:
  application:
    name: ai-security
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  datasource:
    url: ${DB_URL:jdbc:h2:mem:security-audit;DB_CLOSE_DELAY=-1}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  threads:
    virtual:
      enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0

ai-security:
  canary-token: ${CANARY_TOKEN:CANARY_SECRET_DO_NOT_REPEAT}
  injection-classifier-enabled: true
  pii-redaction-enabled: true
  max-input-length: 2000
  audit-retention-days: 90

---
spring:
  config:
    activate:
      on-profile: local
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: llama3.2

---
spring:
  config:
    activate:
      on-profile: cloud
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini

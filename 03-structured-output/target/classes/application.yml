spring:
  application:
    name: structured-output

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:not-configured}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.0    # zero temperature for deterministic structured extraction
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: llama3.1
          temperature: 0.0

app:
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-in-production-must-be-256-bits-long}
      expiration-ms: 3600000
  rate-limit:
    capacity-per-user: 20
    refill-tokens-per-minute: 20
    global-capacity: 200
    global-refill-tokens-per-minute: 200

# Resilience4j: retry on parse failure (not on LLM timeout — that's a different concern)
resilience4j:
  retry:
    instances:
      parseRetry:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - com.masterclass.structured.exception.ParseRetryException

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

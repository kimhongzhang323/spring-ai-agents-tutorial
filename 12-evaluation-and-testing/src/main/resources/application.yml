spring:
  application.name: evaluation
  ai:
    openai.api-key: ${OPENAI_API_KEY:not-configured}
    ollama.base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
app:
  security.jwt:
    secret: ${JWT_SECRET:change-me-in-production-must-be-256-bits-long}
    expiration-ms: 3600000
  rate-limit:
    capacity-per-user: 20
    refill-tokens-per-minute: 20
    global-capacity: 200
    global-refill-tokens-per-minute: 200
eval:
  judge-model: ${JUDGE_MODEL:gpt-4o-mini}
  score-threshold: 0.7
management.endpoints.web.exposure.include: health,info,prometheus
springdoc.swagger-ui.path: /swagger-ui.html

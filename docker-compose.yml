services:

  # ── Local LLM ──────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: masterclass-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Vector Store ───────────────────────────────────────────────────────────
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: masterclass-pgvector
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: masterclass
      POSTGRES_USER: masterclass
      POSTGRES_PASSWORD: masterclass
    volumes:
      - pgvector-data:/var/lib/postgresql/data
      - ./scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U masterclass"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Session Memory & Rate-Limit State ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: masterclass-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass masterclass
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "masterclass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Metrics Scraper ────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: masterclass-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  # ── Dashboards ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: masterclass-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: masterclass
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── Distributed Tracing ────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: masterclass-jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    restart: unless-stopped

volumes:
  ollama-data:
  pgvector-data:
  redis-data:
  grafana-data:
